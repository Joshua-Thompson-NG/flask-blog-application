{% extends "layout.html" %}
{% block  content%}
    {% for i in posts %}
        <div class="card shadow-sm  mb-5">
            <div class="card-body p-4">
                <h2 class="card-title fw-bold text-dark h3">{{i.title}}</h2>

                <p class="card-subtitle  text-muted small">By {{i.author}} on {{i.date_posted}}</p>

                <p class="card-text">{{i.content}}</p>
            </div>
        </div>
    {% endfor %}
{% endblock  content%}
